<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>part.ai</title>

    <!-- Блокируем отрисовку до применения темы и сайдбара -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('part-ai-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);

            const sidebarHidden = localStorage.getItem('part-ai-sidebar') === 'hidden';
            if (sidebarHidden) {
                document.documentElement.style.setProperty('--sidebar-start-hidden', '1');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400&family=Manrope:wght@400;500;600;700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/part.ai/favicon.png" />
  <script type="module" crossorigin src="/part.ai/assets/index-CkFjkHF8.js"></script>
  <link rel="stylesheet" crossorigin href="/part.ai/assets/index-DSpo0YbI.css">
</head>
<body>
    <header class="header">
        <button class="toggle-sidebar-btn" id="toggle-btn" title="Скрыть/показать панель">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m16 15-3-3 3-3"/>
            </svg>
        </button>
        <div class="header-logo">part.ai</div>
    </header>

    <div class="content-wrapper">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <aside class="sidebar" id="sidebar">
            <button class="sidebar-btn" id="new-chat-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Новый чат
            </button>

            <div class="chat-menu">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="chat-menu-btn">
                    <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Чаты
                </label>
                <div class="chat-list-wrapper">
                    <div class="chat-list">
                        <div class="chat-item">Как настроить бекенд на Python</div>
                        <div class="chat-item">Идеи для дизайна интерфейса</div>
                        <div class="chat-item">Помощь с кодом React</div>
                    </div>
                </div>
            </div>

            <button class="theme-toggle-btn" id="theme-toggle" title="Сменить тему">
                <svg class="theme-icon" id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/>
                </svg>
            </button>
        </aside>

        <main class="main-screen">
            <div class="center-content">
                <h1 id="dynamic-title" class="title animate-appear">Загрузка...</h1>
                <p class="subtitle animate-appear delay-1">Создавайте, разворачивайте и масштабируйте ИИ-решения легко.</p>

                <div class="input-container animate-appear delay-2">
                    <form id="chat-form" class="input-box">
                        <div class="placeholder-container" id="placeholder-container"></div>
                        <textarea id="message-input" class="main-input" placeholder="Напишите сообщение..." autocomplete="off"></textarea>
                        <div class="input-actions">
                            <button type="button" class="plus-btn" id="plus-btn">
                                <svg class="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                            <button type="submit" class="send-btn" id="send-btn">
                                <svg class="icon-send" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
